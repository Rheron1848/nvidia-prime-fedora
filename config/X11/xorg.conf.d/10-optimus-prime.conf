# NVIDIA Reverse PRIME - ThinkPad T530
# nvidia 390.xx 传统方式（BusID + Screen），不适用 OutputClass
# Intel HD 4000: PCI:0:2:0 / NVIDIA NVS 5400M: PCI:1:0:0

Section "ServerLayout"
    Identifier "layout"
    Screen 0   "nvidia"
    Inactive   "intel"
EndSection

Section "Device"
    Identifier "nvidia"
    Driver     "nvidia"
    BusID      "PCI:1:0:0"
EndSection

Section "Screen"
    Identifier "nvidia"
    Device     "nvidia"
    Option     "AllowEmptyInitialConfiguration"
EndSection

Section "Device"
    Identifier "intel"
    Driver     "modesetting"
    BusID      "PCI:0:2:0"
    # 若 glamor 与 NVIDIA GLX 冲突，取消下行注释
    # Option   "AccelMethod" "none"
EndSection

Section "Screen"
    Identifier "intel"
    Device     "intel"
EndSection
